name: CI Pipeline level 2

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
         python-version: '3.10'

    - name: Isntall Dependencies
      run: pip install -r requirements.txt

    - name: Run Application
      run: python app.py
